services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.29-alpine
    ports:
      - "${APP_PORT:-8088}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/snippets:/etc/nginx/snippets:ro
    depends_on:
      - app

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: "${DB_DATABASE:-food}"
      POSTGRES_USER: "${DB_USERNAME:-food}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-food}"
    volumes:
      - postgres18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-food} -d ${DB_DATABASE:-food}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  node:
    profiles:
      - dev
    image: node:24-alpine
    working_dir: /var/www/html
    ports:
      - "${VITE_PORT:-5174}:${VITE_PORT:-5174}"
    volumes:
      - ./:/var/www/html
      - node-modules:/var/www/html/node_modules
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port ${VITE_PORT:-5174}"

volumes:
  postgres18-data:
  redis-data:
  node-modules:
